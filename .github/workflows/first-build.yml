name: Correct Robot

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  corrector:
    runs-on: ubuntu-latest # Correction : tiret à la place de l'underscore
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: File generate
        run: |
          echo "test" > mon_fichier.txt

      - name: Commit & push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mon_fichier.txt
          git commit -m "Changement automatique via GitHub Actions"
          git push
